spring.config.import=optional:file:env.properties

server.port=${PORT}

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL}
app.frontend.verify-email-url=${FRONTEND_VERIFY_EMAIL_URL}

app.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_ENABLE}
app.mail.from=${APP_MAIL_FROM}

app.email-verification.token-minutes=${EMAIL_VERIFICATION_TOKEN_MINUTES:1440}

app.ticket.cancel-min-people-before=${TICKET_CANCEL_MIN_PEOPLE_BEFORE:2}